<!doctype html>
<html lang="en" data-theme="night" style="overflow-x: hidden;">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:wght@400;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet" />
    %sveltekit.head%
    <style>
      /* ── Markdown / Prose typography ── */
      .prose {
        line-height: 1.75;
        color: var(--color-base-content);
        font-family: 'Nunito', sans-serif;
      }
      .prose > * + * {
        margin-top: 1.25em;
      }

      /* Headings */
      .prose h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2em; font-weight: 800; margin-top: 0; margin-bottom: 0.5em; line-height: 1.2; }
      .prose h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.5em; font-weight: 700; margin-top: 1.75em; margin-bottom: 0.5em; line-height: 1.3; }
      .prose h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.25em; font-weight: 600; margin-top: 1.5em; margin-bottom: 0.4em; line-height: 1.4; }
      .prose h4 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.1em; font-weight: 600; margin-top: 1.25em; margin-bottom: 0.4em; line-height: 1.4; }

      /* Heading anchors */
      .prose h1, .prose h2, .prose h3, .prose h4 { position: relative; }
      .prose .anchor-link {
        position: absolute;
        left: -1.25em;
        color: var(--color-primary);
        text-decoration: none;
        opacity: 0;
        font-weight: 400;
        transition: opacity 0.15s ease;
      }
      .prose h1:hover .anchor-link,
      .prose h2:hover .anchor-link,
      .prose h3:hover .anchor-link,
      .prose h4:hover .anchor-link { opacity: 0.6; }
      .prose .anchor-link:hover { opacity: 1; }
      .prose .anchor-link[data-copied="true"]::after {
        content: 'Copied!';
        position: absolute;
        left: 0;
        top: -1.6em;
        font-size: 0.65em;
        font-weight: 600;
        color: var(--color-success);
        white-space: nowrap;
        animation: fade-in-out 1.5s ease;
      }
      @keyframes fade-in-out {
        0% { opacity: 0; transform: translateY(4px); }
        15% { opacity: 1; transform: translateY(0); }
        70% { opacity: 1; }
        100% { opacity: 0; }
      }

      /* Paragraphs */
      .prose p { margin-top: 1em; margin-bottom: 1em; }

      /* Links */
      .prose a {
        color: var(--color-primary);
        text-decoration: underline;
        text-underline-offset: 2px;
        transition: color 0.15s ease;
      }
      .prose a:hover {
        color: var(--color-accent);
      }

      /* Bold & italic */
      .prose strong { font-weight: 700; }
      .prose em { font-style: italic; }

      /* Lists */
      .prose ul { list-style-type: disc; padding-left: 1.5em; margin-top: 0.75em; margin-bottom: 0.75em; }
      .prose ol { list-style-type: decimal; padding-left: 1.5em; margin-top: 0.75em; margin-bottom: 0.75em; }
      .prose li { margin-top: 0.35em; margin-bottom: 0.35em; }
      .prose li > ul,
      .prose li > ol { margin-top: 0.25em; margin-bottom: 0.25em; }

      /* Blockquotes */
      .prose blockquote {
        border-left: 4px solid var(--color-primary);
        padding: 0.5em 1em;
        margin: 1em 0;
        color: color-mix(in oklch, var(--color-base-content), transparent 20%);
        font-style: italic;
      }
      .prose blockquote p { margin: 0.25em 0; }

      /* Inline code */
      .prose :not(pre) > code {
        background: var(--color-base-200);
        padding: 0.15em 0.35em;
        border-radius: 0.25em;
        font-size: 0.875em;
        font-family: 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      /* Code blocks */
      .prose pre {
        background: var(--color-base-200);
        border-radius: 0.5em;
        padding: 1em;
        overflow-x: auto;
        margin: 1.25em 0;
        font-size: 0.875em;
        line-height: 1.6;
      }
      .prose pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: inherit;
        font-family: 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      /* Tables — horizontally scrollable on mobile */
      .prose .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        margin: 1.25em 0;
      }
      .prose table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9em;
      }
      .prose th,
      .prose td {
        border: 1px solid var(--color-base-300);
        padding: 0.5em 0.75em;
        text-align: left;
      }
      .prose th {
        background: var(--color-base-200);
        font-weight: 600;
      }
      .prose tr:nth-child(even) {
        background: color-mix(in oklch, var(--color-base-200), transparent 60%);
      }

      /* Horizontal rules */
      .prose hr {
        border: none;
        border-top: 1px solid var(--color-base-300);
        margin: 2em 0;
      }

      /* Images */
      .prose img {
        max-width: 100%;
        height: auto;
        border-radius: 0.5em;
        margin: 1em 0;
      }
    </style>
  </head>
  <body data-sveltekit-prerender="false" style="overflow-x: hidden; font-family: 'Nunito', sans-serif;">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
